# Публикует Swagger UI на GitHub Pages при изменении openapi.yaml.
# В настройках репозитория: Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy Swagger to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - openapi.yaml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-swagger
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          mkdir -p _site
          cp openapi.yaml _site/
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>ЗОВ Денег — API</title>
            <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" crossorigin="anonymous" />
            <style>html { box-sizing: border-box; } *, *::before, *::after { box-sizing: inherit; } body { margin: 0; }</style>
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js" crossorigin="anonymous"></script>
            <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js" crossorigin="anonymous"></script>
            <script>
              window.onload = function () {
                window.ui = SwaggerUIBundle({
                  url: new URL("openapi.yaml", window.location.href).href,
                  dom_id: "#swagger-ui",
                  presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
                  layout: "StandaloneLayout",
                });
              };
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
