# Detekt только для основной ветки; не собирает APK (экономия минут CI).

name: Android Detekt (master)

on:
  push:
    branches:
      - master
    paths:
      - "zov-android/**"

permissions:
  contents: read

concurrency:
  group: android-detekt-master-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x zov-android/gradlew

      - name: Run Detekt
        working-directory: zov-android
        run: ./gradlew detekt --no-daemon --stacktrace

      - name: Upload Detekt reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: zov-android/app/build/reports/detekt/
