# Debug APK в артефактах при пуше в ветку android-release (без секретов и release-подписи).

name: Android Debug APK

on:
  push:
    branches:
      - android-release
    paths:
      - "zov-android/**"

permissions:
  contents: read

concurrency:
  group: android-release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x zov-android/gradlew

      - name: Assemble debug APK
        working-directory: zov-android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: zov-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
