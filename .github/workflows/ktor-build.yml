name: Build and Package Services

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

env:
  USER_SERVICE_NAME: user-service
  SECURITIES_SERVICE_NAME: securities-service

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build User Service
      working-directory: ./user-service
      run: |
        chmod +x gradlew
        ./gradlew clean installDist

    - name: Build Securities Service
      working-directory: ./securities-service
      run: |
        chmod +x gradlew
        ./gradlew clean installDist

    - name: Build User Service Docker Image
      working-directory: ./user-service
      run: |
        docker build -t ${{ env.USER_SERVICE_NAME }}:${{ github.sha }} .
        docker save ${{ env.USER_SERVICE_NAME }}:${{ github.sha }} -o user-service.tar

    - name: Build Securities Service Docker Image
      working-directory: ./securities-service
      run: |
        docker build -t ${{ env.SECURITIES_SERVICE_NAME }}:${{ github.sha }} .
        docker save ${{ env.SECURITIES_SERVICE_NAME }}:${{ github.sha }} -o securities-service.tar

    - name: Upload User Service Container
      uses: actions/upload-artifact@v4
      with:
        name: user-service-container
        path: user-service/user-service.tar
        retention-days: 7

    - name: Upload Securities Service Container
      uses: actions/upload-artifact@v4
      with:
        name: securities-service-container
        path: securities-service/securities-service.tar
        retention-days: 7

    - name: Create Release Notes
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        echo "## Build Summary" > release-notes.md
        echo "" >> release-notes.md
        echo "**Commit:** ${{ github.sha }}" >> release-notes.md
        echo "**Branch:** ${{ github.ref_name }}" >> release-notes.md
        echo "**Build Time:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> release-notes.md
        echo "" >> release-notes.md
        echo "### Artifacts" >> release-notes.md
        echo "- user-service-container.tar" >> release-notes.md
        echo "- securities-service-container.tar" >> release-notes.md

    - name: Upload Release Notes
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: release-notes
        path: release-notes.md
        retention-days: 7
