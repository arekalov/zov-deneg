version: "3.9"

services:

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: zov-clickhouse
    env_file:
      - ./zov-back/env/clickhouse.env
    ports:
      - "${CLICKHOUSE_PORT_HTTP:-8123}:8123"
      - "${CLICKHOUSE_PORT_NATIVE:-9000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./zov-back/securities-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./zov-back/securities-service/test-data.sql:/docker-entrypoint-initdb.d/test-data.sql
    networks:
      - zov-network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password securities_pass --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  collector:
    build:
      context: ./zov-go
      dockerfile: Dockerfile
    container_name: zov-collector
    depends_on:
      clickhouse:
        condition: service_healthy
    env_file:
      - ./zov-back/env/clickhouse.env
    environment:
      SOCKET_PATH: /tmp/zovdengi/driver.sock
    volumes:
      - shared_socket:/tmp/zovdengi
    networks:
      - zov-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-S", "/tmp/zovdengi/driver.sock"]
      interval: 2s
      retries: 10

  driver:
    build:
      context: ./zov-c-driver
      dockerfile: Dockerfile
    container_name: zov-driver
    depends_on:
      collector:
        condition: service_healthy
    volumes:
      - shared_socket:/tmp/zovdengi
    networks:
      - zov-network
    restart: unless-stopped

# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  clickhouse_data:
    driver: local
    name: zov-clickhouse-data
  shared_socket:
    driver: local
    name: zov-shared-socket

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  zov-network:
    driver: bridge
    name: zov-deneg-network
