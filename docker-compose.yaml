services:
  # ============================================================================
  # DATABASES
  # ============================================================================

  postgres:
    image: postgres:15-alpine
    container_name: zov-postgres
    env_file:
      - ./zov-back/env/postgres.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zov-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userservice"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: zov-clickhouse
    env_file:
      - ./zov-back/env/clickhouse.env
    ports:
      - "${CLICKHOUSE_PORT_HTTP:-8123}:8123"
      - "${CLICKHOUSE_PORT_NATIVE:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./zov-back/securities-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./zov-back/securities-service/test-data.sql:/docker-entrypoint-initdb.d/test-data.sql
    networks:
      - zov-network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password securities_pass --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================================
  # APPLICATION SERVICES
  # ============================================================================

  user-service:
    build:
      context: ./zov-back/user-service
      dockerfile: Dockerfile
    container_name: zov-user-service
    env_file:
      - ./zov-back/env/postgres.env
      - ./zov-back/env/jwt.env
      - ./zov-back/env/user-service.env
    ports:
      - "${USER_SERVICE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zov-network
    restart: unless-stopped

  securities-service:
    build:
      context: ./zov-back/securities-service
      dockerfile: Dockerfile
    container_name: zov-securities-service
    env_file:
      - ./zov-back/env/clickhouse.env
      - ./zov-back/env/jwt.env
      - ./zov-back/env/securities-service.env
    ports:
      - "${SECURITIES_SERVICE_PORT:-8081}:8080"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - zov-network
    restart: unless-stopped

  collector:
    build:
      context: ./zov-go
      dockerfile: Dockerfile
    container_name: zov-collector
    depends_on:
      clickhouse:
        condition: service_healthy
    env_file:
      - ./zov-back/env/clickhouse.env
    environment:
      SOCKET_PATH: /tmp/zovdengi/driver.sock
    volumes:
      - shared_socket:/tmp/zovdengi
    networks:
      - zov-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-S", "/tmp/zovdengi/driver.sock"]
      interval: 2s
      retries: 10

  driver:
    build:
      context: ./zov-c-driver
      dockerfile: Dockerfile
    container_name: zov-driver
    depends_on:
      collector:
        condition: service_healthy
    volumes:
      - shared_socket:/tmp/zovdengi
    networks:
      - zov-network
    restart: unless-stopped
# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  postgres_data:
    driver: local
    name: zov-postgres-data
  clickhouse_data:
    driver: local
    name: zov-clickhouse-data
  shared_socket:
    driver: local
    name: zov-shared-socket

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  zov-network:
    driver: bridge
    name: zov-deneg-network
